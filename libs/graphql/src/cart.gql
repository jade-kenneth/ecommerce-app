mutation UpdateCartItem($input: UpdateCartItemInput!) {
  updateCartItem(input: $input)
}

query Cart {
  cart {
    _id
    items {
      productId
      quantity
      unitPrice
      totalPrice
    }
    subtotal
    tax
    status
    createdAt
    updatedAt
  }
}
query MyOrders {
  myOrders {
    _id
    items {
      productId
      quantity
      unitPrice
      totalPrice
      rating
      message
    }
    shippingOption {
      type
      label
      description
      estimatedDays
      fee
    }
    subtotal
    tax
    shippingFee
    total
    status
    createdAt
  }
}

query ShippingOptions {
  shippingOptions {
    _id
    type
    label
    description
    fee
    estimatedDays
  }
}

query PaymentMethods {
  paymentMethods {
    _id
    type
    label
    description
    isActive
  }
}

query CheckoutMethodSettings {
  shippingOptions(includeInactive: true) {
    _id
    type
    label
    description
    fee
    estimatedDays
    isActive
  }
  paymentMethods(includeInactive: true) {
    _id
    type
    label
    description
    isActive
  }
}

mutation Checkout($input: CheckoutInput!) {
  checkout(input: $input) {
    _id
    items {
      productId
      quantity
      unitPrice
      totalPrice
      rating
      message
    }
    shippingOption {
      type
      label
      description
      estimatedDays
      fee
    }
    paymentMethod {
      type
    }
    subtotal
    tax
    shippingFee
    total
    status
    createdAt
  }
}

mutation RemoveFromCart($input: RemoveFromCartInput!) {
  removeFromCart(input: $input)
}

mutation UpdateOrderStatus($input: UpdateOrderStatusInput!) {
  updateOrderStatus(input: $input)
}

mutation CreateProductReview($input: CreateProductReviewInput!) {
  createProductReview(input: $input) {
    _id
    productId
    accountId
    orderId
    rating
    message
    createdAt
    updatedAt
  }
}

mutation UpdateShippingMethodStatus($input: UpdateShippingMethodStatusInput!) {
  updateShippingMethodStatus(input: $input)
}

mutation UpdatePaymentMethodStatus($input: UpdatePaymentMethodStatusInput!) {
  updatePaymentMethodStatus(input: $input)
}
